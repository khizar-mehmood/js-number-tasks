<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Number Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0c10;
      --surface: #13141a;
      --card: #1a1b24;
      --border: #2a2b38;
      --accent: #00e5a0;
      --accent2: #ff6b6b;
      --accent3: #ffd166;
      --accent4: #74b9ff;
      --text: #e8e8f0;
      --muted: #6b6c80;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      max-width: 780px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.6s ease both;
    }

    header .tag {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
      display: block;
    }

    header h1 {
      font-family: var(--font-head);
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      line-height: 1.1;
      color: var(--text);
    }

    header h1 span { color: var(--accent); }

    header p {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    /* Input area */
    .input-zone {
      display: flex;
      gap: 12px;
      align-items: stretch;
      margin-bottom: 2rem;
      animation: fadeUp 0.5s 0.2s ease both;
    }

    .input-zone input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 18px;
      padding: 12px 18px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-zone input:focus { border-color: var(--accent); }
    .input-zone input::placeholder { color: var(--muted); }

    .input-zone button {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 15px;
      padding: 12px 28px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.15s, transform 0.1s;
    }

    .input-zone button:hover { opacity: 0.88; }
    .input-zone button:active { transform: scale(0.97); }

    /* Error */
    .error-msg {
      color: var(--accent2);
      font-size: 12px;
      margin-top: -1.2rem;
      margin-bottom: 1rem;
      min-height: 18px;
    }

    /* Task cards */
    .tasks { display: flex; flex-direction: column; gap: 1rem; }

    .task-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }

    .task-card:nth-child(1) { animation-delay: 0.05s; }
    .task-card:nth-child(2) { animation-delay: 0.1s; }
    .task-card:nth-child(3) { animation-delay: 0.15s; }
    .task-card:nth-child(4) { animation-delay: 0.2s; }
    .task-card:nth-child(5) { animation-delay: 0.25s; }

    .task-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      cursor: pointer;
      border-bottom: 1px solid transparent;
      transition: background 0.15s;
      user-select: none;
    }

    .task-header:hover { background: rgba(255,255,255,0.03); }
    .task-card.open .task-header { border-bottom-color: var(--border); }

    .task-num {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 13px;
      flex-shrink: 0;
    }

    .t1 .task-num { background: rgba(0,229,160,0.15); color: var(--accent); }
    .t2 .task-num { background: rgba(116,185,255,0.15); color: var(--accent4); }
    .t3 .task-num { background: rgba(255,209,102,0.15); color: var(--accent3); }
    .t4 .task-num { background: rgba(255,107,107,0.15); color: var(--accent2); }
    .t5 .task-num { background: rgba(162,155,254,0.15); color: #a29bfe; }

    .task-title {
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
    }

    .task-chevron {
      color: var(--muted);
      font-size: 12px;
      transition: transform 0.2s;
    }

    .task-card.open .task-chevron { transform: rotate(180deg); }

    .task-body {
      display: none;
      padding: 16px 18px;
    }

    .task-card.open .task-body { display: block; }

    .output-area {
      font-size: 12px;
      line-height: 2;
      color: var(--muted);
      max-height: 260px;
      overflow-y: auto;
      word-break: break-word;
    }

    .output-area::-webkit-scrollbar { width: 4px; }
    .output-area::-webkit-scrollbar-track { background: transparent; }
    .output-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .num { color: var(--text); }
    .hl-4  { color: var(--accent2); font-weight: 700; }
    .hl-prime { color: #a29bfe; font-weight: 700; }

    /* stat pills */
    .stats-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
    .pill {
      padding: 5px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      font-family: var(--font-head);
    }
    .pill-green  { background: rgba(0,229,160,0.12); color: var(--accent); }
    .pill-blue   { background: rgba(116,185,255,0.12); color: var(--accent4); }
    .pill-amber  { background: rgba(255,209,102,0.12); color: var(--accent3); }
    .pill-red    { background: rgba(255,107,107,0.12); color: var(--accent2); }
    .pill-purple { background: rgba(162,155,254,0.12); color: #a29bfe; }

    .legend { font-size: 11px; color: var(--muted); margin-top: 10px; }
    .legend span { font-weight: 700; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <span class="tag">JavaScript Tasks</span>
    <h1>Number <span>Tasks</span></h1>
    <p>Enter a number N and run all five tasks simultaneously.</p>
  </header>

  <div class="input-zone">
    <input type="number" id="nInput" placeholder="Enter N (e.g. 30)" min="1" max="500" value="20"/>
    <button onclick="runAll()">RUN</button>
  </div>
  <div class="error-msg" id="errMsg"></div>

  <div class="tasks">

    <!-- Task 1 -->
    <div class="task-card t1 open" id="card1">
      <div class="task-header" onclick="toggleCard('card1')">
        <div class="task-num">1</div>
        <div class="task-title">Number Pattern — 1 to N</div>
        <div class="task-chevron">▼</div>
      </div>
      <div class="task-body">
        <div class="output-area" id="out1"></div>
      </div>
    </div>

    <!-- Task 2 -->
    <div class="task-card t2 open" id="card2">
      <div class="task-header" onclick="toggleCard('card2')">
        <div class="task-num">2</div>
        <div class="task-title">Even &amp; Odd Count</div>
        <div class="task-chevron">▼</div>
      </div>
      <div class="task-body">
        <div class="output-area" id="out2"></div>
      </div>
    </div>

    <!-- Task 3 -->
    <div class="task-card t3 open" id="card3">
      <div class="task-header" onclick="toggleCard('card3')">
        <div class="task-num">3</div>
        <div class="task-title">Sum Divisible by 3 and 5</div>
        <div class="task-chevron">▼</div>
      </div>
      <div class="task-body">
        <div class="output-area" id="out3"></div>
      </div>
    </div>

    <!-- Task 4 -->
    <div class="task-card t4 open" id="card4">
      <div class="task-header" onclick="toggleCard('card4')">
        <div class="task-num">4</div>
        <div class="task-title">Reverse — Highlight Divisible by 4</div>
        <div class="task-chevron">▼</div>
      </div>
      <div class="task-body">
        <div class="output-area" id="out4"></div>
      </div>
    </div>

    <!-- Task 5 -->
    <div class="task-card t5 open" id="card5">
      <div class="task-header" onclick="toggleCard('card5')">
        <div class="task-num">5</div>
        <div class="task-title">Prime Numbers</div>
        <div class="task-chevron">▼</div>
      </div>
      <div class="task-body">
        <div class="output-area" id="out5"></div>
      </div>
    </div>

  </div>
</div>

<script>
  function toggleCard(id) {
    document.getElementById(id).classList.toggle('open');
  }

  function runAll() {
    var N = parseInt(document.getElementById('nInput').value);
    var errEl = document.getElementById('errMsg');

    if (isNaN(N) || N < 1 || N > 500) {
      errEl.textContent = 'Please enter a valid number between 1 and 500.';
      return;
    }
    errEl.textContent = '';

    // Task 1: Number Pattern 1 to N
    var out1 = '';
    for (var i = 1; i <= N; i++) {
      out1 += i + ' ';
    }
    document.getElementById('out1').textContent = out1;

    // Task 2: Even & Odd Count
    var even = 0, odd = 0;
    for (var i = 1; i <= N; i++) {
      if (i % 2 === 0) even++;
      else odd++;
    }
    document.getElementById('out2').textContent = 'Even count: ' + even + '\nOdd count:  ' + odd;

    // Task 3: Sum divisible by 3 AND 5
    var sum = 0, nums = '';
    for (var i = 1; i <= N; i++) {
      if (i % 3 === 0 && i % 5 === 0) {
        sum += i;
        nums += i + ' ';
      }
    }
    document.getElementById('out3').textContent = nums === ''
      ? 'No numbers divisible by both 3 and 5.'
      : 'Numbers: ' + nums + '\nSum: ' + sum;

    // Task 4: Reverse, highlight divisible by 4
    var out4 = '';
    for (var i = N; i >= 1; i--) {
      if (i % 4 === 0) out4 += '[' + i + '] ';
      else out4 += i + ' ';
    }
    document.getElementById('out4').textContent = out4 + '\n( [ ] = divisible by 4 )';

    // Task 5: Prime Numbers
    var primes = '', count = 0;
    for (var i = 2; i <= N; i++) {
      var isPrime = true;
      for (var j = 2; j * j <= i; j++) {
        if (i % j === 0) { isPrime = false; break; }
      }
      if (isPrime) { primes += i + ' '; count++; }
    }
    document.getElementById('out5').textContent = count === 0
      ? 'No primes found.'
      : 'Primes: ' + primes + '\nTotal: ' + count;
  }

  runAll();
</script>
</body>
</html>
